<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generator</title>
<style>
    body {
        font-family: Arial;
        text-align: center;
        background: #0f0f0f;
        color: white;
        margin-top: 100px;
    }

    img {
        width: 100px;
        margin-bottom: 20px;
    }

    button {
        padding: 10px 20px;
        font-size: 18px;
        cursor: pointer;
    }

    #result {
        margin-top: 20px;
        font-size: 20px;
        display: none;
    }

    #message {
        margin-top: 15px;
        color: red;
        font-size: 18px;
        display: none;
    }
</style>
</head>

<body>

<img src="https://i.imgur.com/jtsbazj.png" alt="logo">

<h1>Random Minecraft Server IP</h1>

<button onclick="generate()">Generate</button>

<div id="result">
    <p id="text"></p>
    <button onclick="copyText()">Copy</button>
    <div id="message">You ran out of tries</div>
</div>

<script>
const ips = [
    "mc.hypixel.net",
    "mineplex.com",
    "2b2t.org",
    "play.cubecraft.net",
    "clanworld2.com"
];

let index = 0;

function generate() {
    document.getElementById("result").style.display = "block";

    const textEl = document.getElementById("text");
    const message = document.getElementById("message");

    textEl.innerText = ips[index];

    if (index === ips.length - 1) {
        message.style.display = "block";
    } else {
        message.style.display = "none";
        index++;
    }
}

function copyText() {
    const text = document.getElementById("text").innerText;
    if (!text) return;

    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => alert("Copied!")).catch(() => fallbackCopy(text));
    } else {
        fallbackCopy(text);
    }
}

function fallbackCopy(text) {
    const el = document.createElement("textarea");
    el.value = text;
    el.style.position = "fixed";
    el.style.opacity = "0";
    document.body.appendChild(el);
    el.focus();
    el.select();
    try {
        document.execCommand("copy");
        alert("Copied!");
    } catch (e) {
        alert("Copy failed. Please copy manually.");
    }
    document.body.removeChild(el);
}
</script>

</body>
</html>
